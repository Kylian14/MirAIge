name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# Least privilege by default; each job elevates only what it needs.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Quality ───────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint services
        run: ruff check services/

  # ── SAST: bandit rules via ruff, reported to the Security tab ──────────
  sast-bandit:
    name: SAST (bandit/ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run bandit security rules (S) and emit SARIF
        run: |
          pip install ruff
          ruff check --select S --output-format sarif --output-file bandit.sarif services/ || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: bandit.sarif
          category: bandit

  # ── SCA: dependency advisory report (informational) ────────────────────
  deps-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Audit every requirements file (advisory, non-blocking)
        continue-on-error: true
        run: |
          pip install pip-audit
          for f in $(find . -name 'requirements*.txt' -not -path '*/node_modules/*'); do
            echo "::group::pip-audit $f"
            pip-audit -r "$f" --desc || true
            echo "::endgroup::"
          done

  # ── Secrets: scan the full git history ─────────────────────────────────
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Deception components are allowlisted here (see SECURITY.md).
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml

  # ── Dockerfile lint (best practices + hardening) ───────────────────────
  dockerfile-lint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - services/api/Dockerfile
          - services/sentinel/Dockerfile
          - services/orchestrator/Dockerfile
          - services/mcp_server/Dockerfile
          - services/ghost_shell/Dockerfile
          - services/mirage_metrics/Dockerfile
          - services/fake_portal/Dockerfile
          - deploy/proxy/inline/Dockerfile
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          format: sarif
          output-file: hadolint.sarif
          failure-threshold: error
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: hadolint.sarif
          category: hadolint-${{ matrix.dockerfile }}

  # ── SCA + IaC misconfig over the repo (gating) ─────────────────────────
  fs-scan:
    name: Filesystem scan (trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      - name: Trivy gate (fail on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ── Workflow security (actionlint gates, zizmor reports) ───────────────
  workflow-security:
    name: Workflow security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: local
          fail_level: error
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: zizmor (GitHub Actions auditor)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pip install zizmor
          zizmor --format sarif .github/workflows > zizmor.sarif || true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  # ── Functional gates (unchanged behaviour, hardened pins) ──────────────
  tests:
    name: Test suite (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run characterization test suite (offline, no cloud)
        run: python -m pytest -q

  stack-smoke:
    name: Stack smoke test (offline, no cloud)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build & start the stack
        run: |
          cp .env.example .env
          docker compose up --build -d

      - name: Wait for services to become healthy
        run: |
          set -e
          for i in $(seq 1 30); do
            ok=1
            body="$(curl -sf http://localhost:8000/api/v1/health || true)"
            if [ -z "$body" ]; then
              ok=0
            else
              echo "$body" | python3 -c 'import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get("backends") and all(v=="ok" for v in d["backends"].values()) else 1)' || ok=0
            fi
            curl -sf "http://localhost:8080/" >/dev/null || ok=0
            curl -sf "http://localhost:8090/" >/dev/null || ok=0
            if [ "$ok" = "1" ]; then echo "all services healthy"; break; fi
            echo "waiting ($i)…"; sleep 5
          done
          echo "final console health:"
          curl -sf http://localhost:8000/api/v1/health

      - name: Run an end-to-end attack (offline stub mode)
        run: |
          python3 -m pip install -r services/attack_simulator/requirements.txt
          python3 -m services.attack_simulator.attack \
            --target http://localhost:8080 --level naive-full --duration 20

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

  # ── Image scan on branches/PRs: build locally, never push ──────────────
  image-scan:
    name: Image scan (${{ matrix.service }})
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: [tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - sentinel
          - orchestrator
          - mcp_server
          - ghost_shell
          - mirage_metrics
          - fake_portal
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build image (local only)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          load: true
          tags: localscan/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: localscan/${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}
      - name: Trivy gate (fail on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: localscan/${{ matrix.service }}:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ── Release: build, scan-gate, push, SBOM, sign, provenance ────────────
  publish:
    name: Release (${{ matrix.service }})
    needs: [lint, tests, stack-smoke, secrets, fs-scan, dockerfile-lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless + provenance OIDC
      attestations: write # build provenance attestation
      security-events: write # trivy SARIF
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - sentinel
          - orchestrator
          - mcp_server
          - ghost_shell
          - mirage_metrics
          - fake_portal
    env:
      SERVICE: ${{ matrix.service }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image ref (GHCR requires it)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/miraige-${SERVICE}" >> "$GITHUB_ENV"

      - name: Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest

      - name: Build image (local, for pre-push scan)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          load: true
          tags: localscan/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: localscan/${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-release-${{ matrix.service }}
      - name: Trivy gate (block release on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: localscan/${{ matrix.service }}:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Build & push release image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          provenance: false

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}.cdx.json
          upload-artifact: false
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image + attest SBOM (keyless / Sigstore)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
          cosign attest --yes --type cyclonedx \
            --predicate "sbom-${SERVICE}.cdx.json" "${IMAGE}@${DIGEST}"

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
