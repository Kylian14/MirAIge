name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# Least privilege by default; each job elevates only what it needs.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Quality ───────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint services
        run: ruff check services/

  # ── SAST: bandit rules via ruff, reported to the Security tab ──────────
  sast-bandit:
    name: SAST (bandit/ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Run bandit security rules (S) and emit SARIF
        run: |
          pip install ruff
          ruff check --select S --output-format sarif --output-file bandit.sarif services/ || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: bandit.sarif
          category: bandit

  # ── SCA: dependency advisory report (informational) ────────────────────
  deps-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Audit every requirements file (advisory, non-blocking)
        continue-on-error: true
        run: |
          pip install pip-audit
          find . -name 'requirements*.txt' -not -path '*/node_modules/*' -print0 |
            while IFS= read -r -d '' f; do
              echo "::group::pip-audit $f"
              pip-audit -r "$f" --desc || true
              echo "::endgroup::"
            done

  # ── Secrets: scan the full git history ─────────────────────────────────
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Deception components are allowlisted here (see SECURITY.md).
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml

  # ── Dockerfile lint (best practices + hardening) ───────────────────────
  dockerfile-lint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - services/api/Dockerfile
          - services/sentinel/Dockerfile
          - services/orchestrator/Dockerfile
          - services/mcp_server/Dockerfile
          - services/ghost_shell/Dockerfile
          - services/mirage_metrics/Dockerfile
          - services/fake_portal/Dockerfile
          - deploy/proxy/inline/Dockerfile
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          format: sarif
          output-file: hadolint.sarif
          failure-threshold: error
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: hadolint.sarif
          category: hadolint-${{ matrix.dockerfile }}

  # ── SCA + IaC misconfig over the repo (gating) ─────────────────────────
  fs-scan:
    name: Filesystem scan (trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # Report-only: dependency vulns + IaC misconfig surfaced in the Security tab.
      - name: Trivy filesystem scan (SARIF, vuln + misconfig)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      # Gate: block only on fixable dependency CVEs. IaC misconfig (Helm/K8s
      # hardening) stays report-only above — the chart is hardened in deploy/helm
      # but K8s posture rules should not hard-block the build.
      - name: Trivy gate (fail on fixable CRITICAL/HIGH vulns)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ── Workflow security (actionlint gates, zizmor reports) ───────────────
  workflow-security:
    name: Workflow security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: local
          fail_level: error
          # Report on all lines, not just a PR diff — the local reporter has no
          # diff to filter against (otherwise: "reviewdog: diff command is empty").
          filter_mode: nofilter
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: zizmor (GitHub Actions auditor)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pip install zizmor
          zizmor --format sarif .github/workflows > zizmor.sarif || true
      - name: Upload SARIF
        if: always() && hashFiles('zizmor.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  # ── Functional gates (unchanged behaviour, hardened pins) ──────────────
  tests:
    name: Test suite (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run characterization test suite (offline, no cloud)
        run: python -m pytest -q

  stack-smoke:
    name: Stack smoke test (offline, no cloud)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build & start the stack
        run: |
          cp .env.example .env
          docker compose up --build -d

      - name: Wait for services to become healthy
        run: |
          set -e
          for i in $(seq 1 30); do
            ok=1
            body="$(curl -sf http://localhost:8000/api/v1/health || true)"
            if [ -z "$body" ]; then
              ok=0
            else
              echo "$body" | python3 -c 'import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get("backends") and all(v=="ok" for v in d["backends"].values()) else 1)' || ok=0
            fi
            curl -sf "http://localhost:8080/" >/dev/null || ok=0
            curl -sf "http://localhost:8090/" >/dev/null || ok=0
            if [ "$ok" = "1" ]; then echo "all services healthy"; break; fi
            echo "waiting ($i)…"; sleep 5
          done
          echo "final console health:"
          curl -sf http://localhost:8000/api/v1/health

      - name: Run an end-to-end attack (offline stub mode)
        run: |
          python3 -m pip install -r services/attack_simulator/requirements.txt
          python3 -m services.attack_simulator.attack \
            --target http://localhost:8080 --level naive-full --duration 20

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

  # ── Image scan on branches/PRs: build locally, never push ──────────────
  image-scan:
    name: Image scan (${{ matrix.service }})
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: [tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - sentinel
          - orchestrator
          - mcp_server
          - ghost_shell
          - mirage_metrics
          - fake_portal
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build image (local only)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          load: true
          tags: localscan/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: localscan/${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}
      - name: Trivy gate (fail on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: localscan/${{ matrix.service }}:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ── Inline proxy image scan (report-only) ─────────────────────────────
  # The openresty base image's CVEs are upstream's to fix (Dependabot tracks
  # the base), so they surface in the Security tab without blocking the build.
  proxy-scan:
    name: Proxy image scan (report-only)
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: [tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build proxy image (local only)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/proxy/inline/Dockerfile
          load: true
          tags: localscan/proxy:ci
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy
      - name: Trivy image scan (SARIF, report-only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: localscan/proxy:ci
          format: sarif
          output: trivy-proxy.sarif
          severity: CRITICAL,HIGH
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-proxy.sarif
          category: trivy-image-proxy

  # ── Release: build, scan-gate, push, SBOM, sign, provenance ────────────
  publish:
    name: Release (${{ matrix.service }})
    needs: [lint, tests, stack-smoke, secrets, fs-scan, dockerfile-lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless + provenance OIDC
      attestations: write # build provenance attestation
      security-events: write # trivy SARIF
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - sentinel
          - orchestrator
          - mcp_server
          - ghost_shell
          - mirage_metrics
          - fake_portal
    env:
      SERVICE: ${{ matrix.service }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image ref (GHCR requires it)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/miraige-${SERVICE}" >> "$GITHUB_ENV"

      - name: Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest

      - name: Build image (local, for pre-push scan)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          load: true
          tags: localscan/${{ matrix.service }}:ci
          # Same labels as the pushed build so the scanned image is byte-identical
          # (same config digest) to what is published below.
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: localscan/${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-release-${{ matrix.service }}
      - name: Trivy gate (block release on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: localscan/${{ matrix.service }}:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Build & push release image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          provenance: false

      - name: Assert a release digest was produced
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          test -n "$DIGEST" || { echo "::error::empty image digest — refusing to sign/attest"; exit 1; }

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}.cdx.json
          upload-artifact: false
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.5.2" # pinned; this installer can't fetch v3.x (no detached .sig asset)

      - name: Sign image (keyless / Sigstore)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # SBOM and provenance both go through GitHub's attest actions (OCI referrers +
      # attestations API), so they don't clobber each other the way cosign attest did.
      - name: Attest the SBOM (CycloneDX)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom-${{ matrix.service }}.cdx.json
          push-to-registry: true

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
