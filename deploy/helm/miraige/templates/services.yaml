{{- range $name, $svc := .Values.services }}
{{- $kname := include "miraige.svcName" $name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $kname }}
  labels:
    {{- include "miraige.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $kname }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $kname }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $kname }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $kname }}
          image: "{{ $.Values.image.registry }}/{{ $.Values.image.repoPrefix }}{{ $name }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          securityContext:
            {{- toYaml $.Values.securityContext | nindent 12 }}
          ports:
            - containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef:
                name: {{ $.Release.Name }}-config
            - secretRef:
                name: {{ $.Release.Name }}-secrets
          env:
            # Read-only rootfs: don't let CPython write .pyc bytecode to /app.
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            {{- range $k, $v := $svc.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: {{ $svc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ $svc.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $kname }}
  labels:
    {{- include "miraige.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $kname }}
spec:
  selector:
    app.kubernetes.io/name: {{ $kname }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
{{- end }}
