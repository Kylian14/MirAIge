# Inline enforcement proxy: per request, check the Redis flag set and route a
# flagged mg_session / IP to the Ghost Shell, everything else to the upstream.
worker_processes auto;
error_log /dev/stderr warn;
pid /run/openresty.pid;

# nginx wipes the environment except these — expose what the Lua needs.
env REDIS_HOST;
env REDIS_PORT;
env RESOURCE_PREFIX;
env UPSTREAM_URL;
env GHOST_SHELL_URL;
env SENTINEL_URL;

events { worker_connections 1024; }

http {
    access_log /dev/stdout;
    lua_package_path "/usr/local/openresty/lua/?.lua;;";
    resolver 127.0.0.11 ipv6=off valid=10s;   # Docker embedded DNS (service names)

    map $http_upgrade $connection_upgrade {   # WebSocket-aware upstreams
        default upgrade;
        ''      close;
    }

    init_by_lua_block {
        _G.miraige = {
            redis_host = os.getenv("REDIS_HOST") or "redis",
            redis_port = tonumber(os.getenv("REDIS_PORT") or "6379"),
            prefix     = os.getenv("RESOURCE_PREFIX") or "miraige",
            upstream   = os.getenv("UPSTREAM_URL") or "http://fake_portal_prod:8080",
            ghost      = os.getenv("GHOST_SHELL_URL") or "http://ghost_shell:8080",
            sentinel   = os.getenv("SENTINEL_URL") or "http://sentinel:8001",
        }
        local f = io.open("/usr/local/openresty/lua/canary_manifest.json", "r")
        if f then
            local raw = f:read("*a"); f:close()
            local ok, m = pcall(require("cjson").decode, raw)
            _G.miraige.canary = ok and m or {}
        else
            _G.miraige.canary = {}
        end
    }

    server {
        listen 8080;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location / {
            set $target "";
            access_by_lua_file /usr/local/openresty/lua/flag_router.lua;
            log_by_lua_file    /usr/local/openresty/lua/mirror.lua;

            proxy_pass $target$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }
    }
}
