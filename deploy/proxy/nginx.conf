# Mir[AI]ge dashboard reverse-proxy (nginx).
# HTTP only by default. For TLS, mount a cert + key (see nginx.yml) and
# uncomment the 443 server block below.

# The dashboard (Streamlit) needs WebSocket upgrade for live updates.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    location / {
        # Browser security headers (console served to operators). `always` so they
        # are emitted on error responses too. No HSTS here — this block is plain HTTP.
        add_header X-Frame-Options        "DENY"        always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy        "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # Trust boundary: this proxy is the edge, so OVERWRITE X-Forwarded-* from the
        # real connection — never propagate a client-supplied XFF. $proxy_add_x_forwarded_for
        # appends $remote_addr; if you sit behind another trusted proxy, set real_ip_* instead.
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 86400;
    }
}

