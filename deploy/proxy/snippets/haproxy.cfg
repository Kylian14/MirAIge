# Drop-in for an EXISTING HAProxy (merge into your haproxy.cfg).
# The dashboard is published on 127.0.0.1:8000 by docker-compose.prod.yml.
# HAProxy tunnels the dashboard's WebSocket transparently over HTTP/1.1.

frontend miraige_fe
    bind :80
    # bind :443 ssl crt /etc/haproxy/certs/miraige.pem   # add for TLS
    mode http
    # Trust boundary: this proxy is the edge. Drop any client-supplied X-Forwarded-*
    # BEFORE re-deriving them, so the backend can only ever see values we set.
    http-request del-header X-Forwarded-For
    http-request del-header X-Forwarded-Proto
    option forwardfor
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    http-request set-header X-Forwarded-Proto http  if !{ ssl_fc }

    # Browser security headers for the operator console.
    http-response set-header X-Frame-Options "DENY"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header Referrer-Policy "no-referrer"
    # HSTS only when TLS is actually terminated here.
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains" if { ssl_fc }
    http-response set-header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'"
    default_backend miraige_be

backend miraige_be
    mode http
    server dashboard 127.0.0.1:8000
