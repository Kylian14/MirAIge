# Drop-in for an EXISTING nginx (e.g. /etc/nginx/conf.d/miraige.conf).
# The dashboard is published on 127.0.0.1:8000 by docker-compose.prod.yml.
# Add `listen 443 ssl;` + your certs for TLS (or terminate TLS upstream).

map $http_upgrade $connection_upgrade {   # Streamlit needs WebSocket upgrade
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name miraige.example.com;

    location / {
        # Browser security headers (console served to operators). `always` so they
        # are also emitted on error responses.
        add_header X-Frame-Options        "DENY"        always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy        "no-referrer" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
        # Uncomment once you add `listen 443 ssl;` above (only safe when TLS is terminated here):
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # Trust boundary: this proxy is the edge — overwrite X-Forwarded-* from the
        # real connection and never propagate a client-supplied XFF.
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 86400;
    }
}
