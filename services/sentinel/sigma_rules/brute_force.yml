title: Login brute-force endpoint hammering
id: mirage-t0-004
status: stable
description: |
  Detects hammering on authentication endpoints. Aggregated per-IP
  count of attempts within the rolling window. Tier 0 fires on any
  hit ; T1 / T2 will refine based on velocity.
references:
  - https://attack.mitre.org/techniques/T1110/
author: Mir[AI]ge team
date: 2026/05/28
logsource:
  category: webserver
detection:
  selection:
    path|contains:
      - "/login"
      - "/auth"
      - "/signin"
      - "/wp-login"
      - "/wp-admin/admin-ajax.php"
      - "/api/v1/auth"
      - "/oauth/token"
      - "/admin/login"
    method:
      - "POST"
  condition: selection
fields:
  - src_ip
  - path
  - method
falsepositives:
  - Real users logging in (only flags when high volume from same IP)
level: low
tags:
  - attack.credential-access
  - attack.t1110.001
